<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Flappy Unicorn - 3 Spelers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2a0a3a;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100dvh;
      font-family: 'Courier New', monospace; overflow: hidden;
    }
    h1 { color: #FF9ECD; margin-bottom: 6px; font-size: 18px; letter-spacing: 2px;
         text-shadow: 2px 2px 0 #8B0057; }
    .controls-info { display: flex; gap: 20px; margin-bottom: 8px; font-size: 12px;
                     flex-wrap: wrap; justify-content: center; padding: 0 8px; }
    .p1-label { color: #FFD6EC; }
    .p2-label { color: #C77DFF; }
    .p3-label { color: #74C0FC; }

    /* Responsive canvas */
    .canvas-wrap { position: relative; }
    canvas {
      border: 4px solid #FF9ECD; border-radius: 4px; display: block;
      box-shadow: 0 0 20px #FF9ECD66;
      width: min(480px, calc(100vw - 16px));
      aspect-ratio: 480 / 560;
    }

    /* Touch overlay — two tap zones on the canvas */
    .touch-overlay {
      display: none;
      position: absolute;
      inset: 4px; /* sit inside the canvas border */
      pointer-events: none;
    }
    .touch-zone {
      position: absolute;
      top: 0; bottom: 0; width: 50%;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 14px;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    .touch-zone-left  { left: 0; }
    .touch-zone-right { right: 0; }
    .touch-label {
      font-size: 11px; letter-spacing: 1px;
      opacity: 0.45; pointer-events: none;
    }

    @media (hover: none) and (pointer: coarse) {
      h1 { font-size: 15px; margin-bottom: 4px; }
      .controls-info { display: none; }
      .touch-overlay { display: block; }
    }
  </style>
</head>
<body>
  <h1>~* FLAPPY UNICORN - 3 SPELERS *~</h1>
  <div class="controls-info">
    <span class="p1-label">Floris (Toekan): PIJL OMHOOG</span>
    <span class="p2-label">Yune (Paars): W</span>
    <span class="p3-label">Lukas (Roze): SPATIEBALK</span>
  </div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="480" height="560"></canvas>
    <div class="touch-overlay">
      <div class="touch-zone touch-zone-left"  id="touchLeft">
        <span class="touch-label" style="color:#FFD6EC">◄ FLORIS</span>
      </div>
      <div class="touch-zone touch-zone-right" id="touchRight">
        <span class="touch-label" style="color:#C77DFF">YUNE ►</span>
      </div>
    </div>
  </div>

  <script src="constants.js"></script>
  <script src="audio.js"></script>
  <script src="state.js"></script>
  <script src="game.js"></script>
  <script src="draw.js"></script>
  <script src="loop.js"></script>
</body>
</html>
